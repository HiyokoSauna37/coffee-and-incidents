title: Coffee and Incidents
description: SOCアナリスト「ひよっこサウナ」の、バグバウンティとデジタルフォレンジックのメモ。watchTowr Labs スタイルで書きます。コーヒーを片手にどうぞ。
author: ひよっこサウナ (HiyokoSauna)
lang: ja

# https://pages.github.com/themes/
theme: minima

# minima settings
minima:
  skin: dark
  date_format: "%Y-%m-%d"
  social_links:
    - { platform: github, user_url: "https://github.com/HiyokoSauna37" }

# Suppress auto-generated nav links (logo only in header)
header_pages: []

# Jekyll core
markdown: kramdown
permalink: /:year/:month/:day/:title/
timezone: Asia/Tokyo

# Build settings
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Google Analytics 4 (GA4)
# 測定ID（G-XXXXXXXXXX）を取得したら下行のコメントを外して値を入れる
# google_analytics: G-XXXXXXXXXX

# Exclude from processing
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor
  - .gitignore

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      comments: false
